# Real PSP sandbox suites (Stripe + Paysafe + GoCardless + PayPal): every
# assumption the in-memory fakes encode, validated against reality — incl.
# vault/recurring flows and a live SubscriptionManager renewal cycle. Needs
# repo secrets:
#   STRIPE_SECRET_KEY (sk_test_… only — the suite refuses live keys),
#   PAYSAFE_USERNAME, PAYSAFE_PASSWORD, PAYSAFE_CURRENCY (this sandbox: CAD),
#   GOCARDLESS_ACCESS_TOKEN (sandbox read-write token),
#   PAYPAL_CLIENT_ID, PAYPAL_CLIENT_SECRET (+ optional PAYPAL_WEBHOOK_ID).
# Runs on manual dispatch + a weekly cron (sandbox drift detection), never on PRs
# (secrets + real API load don't belong in the PR loop).
name: Integration (real sandboxes)

on:
  workflow_dispatch:
  schedule:
    - cron: "43 5 * * 3" # weekly Wednesday 05:43 UTC

permissions:
  contents: read

concurrency:
  group: integration
  cancel-in-progress: false # never interrupt in-flight real payments

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Verify secrets are configured
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          PAYSAFE_USERNAME: ${{ secrets.PAYSAFE_USERNAME }}
          GOCARDLESS_ACCESS_TOKEN: ${{ secrets.GOCARDLESS_ACCESS_TOKEN }}
          PAYPAL_CLIENT_ID: ${{ secrets.PAYPAL_CLIENT_ID }}
          PAYZEN_SHOP_ID: ${{ secrets.PAYZEN_SHOP_ID }}
          WORLDLINE_MERCHANT_ID: ${{ secrets.WORLDLINE_MERCHANT_ID }}
        run: |
          # The suites skip silently when a provider's env is absent, so a
          # deleted/expired secret would otherwise turn drift detection into a
          # green no-op. Fail for every provisioned provider; PayZen has no
          # sandbox credentials yet and only warns until it does.
          missing=""
          [ -z "$STRIPE_SECRET_KEY" ] && missing="$missing STRIPE_SECRET_KEY"
          [ -z "$PAYSAFE_USERNAME" ] && missing="$missing PAYSAFE_USERNAME"
          [ -z "$GOCARDLESS_ACCESS_TOKEN" ] && missing="$missing GOCARDLESS_ACCESS_TOKEN"
          [ -z "$PAYPAL_CLIENT_ID" ] && missing="$missing PAYPAL_CLIENT_ID"
          if [ -n "$missing" ]; then
            echo "::error::Missing sandbox secrets:$missing — these providers would silently skip"
            exit 1
          fi
          if [ -z "$PAYZEN_SHOP_ID" ]; then
            echo "::warning::PAYZEN_SHOP_ID not configured — the PayZen integration suite will skip"
          fi
          if [ -z "$WORLDLINE_MERCHANT_ID" ]; then
            echo "::warning::WORLDLINE_MERCHANT_ID not configured — needed once the planned Worldline integration suite lands"
          fi
      - run: pnpm run test:integration
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          PAYSAFE_USERNAME: ${{ secrets.PAYSAFE_USERNAME }}
          PAYSAFE_PASSWORD: ${{ secrets.PAYSAFE_PASSWORD }}
          PAYSAFE_ACCOUNT_ID: ${{ secrets.PAYSAFE_ACCOUNT_ID }}
          PAYSAFE_WEBHOOK_HMAC_KEY: ${{ secrets.PAYSAFE_WEBHOOK_HMAC_KEY }}
          PAYSAFE_CURRENCY: ${{ vars.PAYSAFE_CURRENCY || 'CAD' }}
          GOCARDLESS_ACCESS_TOKEN: ${{ secrets.GOCARDLESS_ACCESS_TOKEN }}
          GOCARDLESS_WEBHOOK_SECRET: ${{ secrets.GOCARDLESS_WEBHOOK_SECRET }}
          PAYPAL_CLIENT_ID: ${{ secrets.PAYPAL_CLIENT_ID }}
          PAYPAL_CLIENT_SECRET: ${{ secrets.PAYPAL_CLIENT_SECRET }}
          PAYPAL_WEBHOOK_ID: ${{ secrets.PAYPAL_WEBHOOK_ID }}
          PAYZEN_SHOP_ID: ${{ secrets.PAYZEN_SHOP_ID }}
          PAYZEN_PASSWORD: ${{ secrets.PAYZEN_PASSWORD }}
          PAYZEN_HMAC_KEY: ${{ secrets.PAYZEN_HMAC_KEY }}
          WORLDLINE_API_KEY_ID: ${{ secrets.WORLDLINE_API_KEY_ID }}
          WORLDLINE_SECRET_API_KEY: ${{ secrets.WORLDLINE_SECRET_API_KEY }}
          WORLDLINE_MERCHANT_ID: ${{ secrets.WORLDLINE_MERCHANT_ID }}
          WORLDLINE_WEBHOOKS_KEY_ID: ${{ secrets.WORLDLINE_WEBHOOKS_KEY_ID }}
          WORLDLINE_WEBHOOKS_SECRET_KEY: ${{ secrets.WORLDLINE_WEBHOOKS_SECRET_KEY }}
