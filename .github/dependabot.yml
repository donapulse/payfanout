# Automated dependency updates. Grouped weekly PRs keep noise low; the CI
# gate (lint/types/tests/build) plus dependency-review vet every bump.
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    groups:
      dev-dependencies:
        dependency-type: development
      production-dependencies:
        dependency-type: production
    open-pull-requests-limit: 5
    ignore:
      # Compiler majors are adopted deliberately, not via the weekly group:
      # typescript-eslint has no TypeScript 7 support yet, so a grouped bump
      # crashes the lint gate.
      - dependency-name: typescript
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
