# Security posture, three angles:
#  - CodeQL: static analysis of our own TS/JS for vulnerability patterns
#  - pnpm audit: known CVEs in the dependency tree (high+ fails the build)
#  - gitleaks: secrets accidentally committed anywhere in history
name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 4 * * 1" # weekly Monday 04:17 UTC — catches newly-published CVEs
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  codeql:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-and-quality
      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript-typescript"

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Not `pnpm audit`: npm retired the endpoints it calls (410) and no
      # released pnpm has migrated. scripts/audit-deps.mjs queries the same
      # advisory database, with the same severity gate. See the script header.
      - name: Audit production dependencies (fail on high+)
        run: node scripts/audit-deps.mjs
      - name: Audit dev dependencies (informational)
        run: node scripts/audit-deps.mjs --all --warn-only

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # gitleaks scans the full history
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Org repos need GITLEAKS_LICENSE (free for user-owned repos):
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
