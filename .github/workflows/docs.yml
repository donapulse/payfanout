# Build the VitePress guide + TypeDoc API reference and deploy to GitHub Pages.
# The runner checks out to a parenthesis-free path (/home/runner/work/<repo>/<repo>), so
# `pnpm run docs:api` (TypeDoc) works here even though it can't on a path containing "(3)".
#
# Publishing model: the site is deployed to GitHub Pages ONLY on merge to main. develop (and
# any other branch that matches below) still runs the build job for validation, so a docs
# build break is caught early, but the deploy job is gated to main (see its `if`) and the
# github-pages environment only permits deployments from main.
#
# One-time setup in the repo: Settings -> Pages -> Build and deployment -> Source: "GitHub Actions".
name: Docs

on:
  # Build on pushes to main and develop (docs-affecting paths only); only main deploys.
  push:
    branches: [main, develop]
    paths:
      - 'docs/**'
      - 'packages/**'
      - 'typedoc.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# deploy-pages needs pages: write + id-token: write; the build only needs to read the repo.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deploys at once; let an in-flight deploy finish rather than cancel it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build TypeDoc API + VitePress site
        run: pnpm run docs:build
        env:
          # GitHub Pages project sites are served under /<repo>/ — VitePress base must match.
          # For a user/org site or a custom domain, set this to '/' instead.
          DOCS_BASE: /${{ github.event.repository.name }}/
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs/.vitepress/dist

  # Publish to GitHub Pages on merge to main only. On develop the build above runs for
  # validation, but this job is skipped, so no branch other than main ever deploys.
  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
