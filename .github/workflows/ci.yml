# Fast quality gate on every push and PR: lint, types, boundaries, tests
# with coverage thresholds, and a publishable build. Real-sandbox suites live
# in integration.yml / e2e.yml (they need secrets and are dispatch/cron-run).
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint

  typecheck-and-boundaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - name: Client/server package boundary check
        run: pnpm run check:boundaries

  # Every PR that changes a published package must carry a changeset (opt out
  # of a release note deliberately with an empty changeset: `pnpm changeset --empty`).
  # Promotion/hotfix PRs target main and are exempt — their changesets are
  # consumed by the release flow itself.
  changesets:
    if: github.event_name == 'pull_request' && github.base_ref == 'develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Changed published packages carry a changeset
        run: pnpm exec changeset status --since=origin/develop

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Unit + conformance tests with coverage thresholds
        run: pnpm run test:coverage
      - name: Upload coverage report
        if: always() && matrix.node == 22
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          retention-days: 14

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build every publishable package (tsc emit -> dist)
        run: pnpm run build
      - name: Smoke-load every published package's dist
        run: node scripts/smoke-dist.mjs
