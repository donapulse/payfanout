# Build the VitePress guide + TypeDoc API reference and deploy to GitHub Pages.
# The runner checks out to a parenthesis-free path (/home/runner/work/<repo>/<repo>), so
# `pnpm run docs:api` (TypeDoc) works here even though it can't on a path containing "(3)".
#
# One-time setup in the repo: Settings -> Pages -> Build and deployment -> Source: "GitHub Actions".
name: Docs

on:
  push:
    branches: [main, develop]
    paths:
      - 'docs/**'
      - 'packages/**'
      - 'typedoc.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# deploy-pages needs pages: write + id-token: write; the build only needs to read the repo.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deploys at once; let an in-flight deploy finish rather than cancel it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build TypeDoc API + VitePress site
        run: pnpm run docs:build
        env:
          # GitHub Pages project sites are served under /<repo>/ — VitePress base must match.
          # For a user/org site or a custom domain, set this to '/' instead.
          DOCS_BASE: /${{ github.event.repository.name }}/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
