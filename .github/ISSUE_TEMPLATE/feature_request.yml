name: ✨ Feature request
description: Suggest a capability or improvement.
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? Tell us the problem first, the solution second. Requests to support a **new payment provider** have their own form, please use "New adapter / PSP support" instead.
  - type: checkboxes
    attributes:
      label: Pre-flight checklist
      options:
        - label: I have searched existing issues and discussions for this idea.
          required: true
        - label: This is not a request for a new payment provider (that has its own form).
          required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - "Core domain model / adapter contract (@payfanout/core)"
        - "Server: PaymentService, webhooks (@payfanout/server)"
        - "Routing / failover (PaymentRouter)"
        - "React components / hooks (@payfanout/react)"
        - "An existing adapter"
        - "Conformance suite"
        - "Documentation"
        - "Tooling / CI / developer experience"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that PayFanout makes hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? Include the API shape or pseudocode if you have it.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: checkboxes
    id: contribute
    attributes:
      label: Contribution
      options:
        - label: I am willing to open a pull request for this.
          required: false
